<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="mainDesign.css" />
    <title>입을만해</title>
  </head>
  <body>
    <section class="screen-01">
      <div class="top-logo">로고</div>
      <h1>기온 및 날씨<br />정보</h1>
    </section>

    <div id="mainApp" class="main-app spring">
      <header class="app-header">
        <div class="left-info">
          <span class="logo-text">로고</span>
          <span id="weather">날씨 불러오는 중...</span>
        </div>
        <div class="theme-switch">
          <button
            type="button"
            class="season-btn active-season"
            data-season="spring"
          >
            봄
          </button>
          <button type="button" class="season-btn" data-season="summer">
            여름
          </button>
          <button type="button" class="season-btn" data-season="autumn">
            가을
          </button>
          <button type="button" class="season-btn" data-season="winter">
            겨울
          </button>
        </div>
      </header>

      <section class="screen-02">
        <div class="top-content">
          <div class="box" id="box">
            <div class="slider">
              <div class="adimage">
                <img
                  src="https://lovely-orange-ebdppdfd7q.edgeone.app/9k.png"
                  alt="모델사진1"
                />
              </div>
              <div class="adimage">
                <img
                  src="https://oral-peach-qcbkbuypef.edgeone.app/9k%E3%85%8F.png"
                  alt="모델사진2"
                />
              </div>
              <div class="adimage">
                <img
                  src="https://objective-rose-ecp2k6ir6t.edgeone.app/2Q.png"
                  alt="모델사진3"
                />
              </div>
              <div class="adimage">
                <img
                  src="https://mammoth-amaranth-buzithtol8.edgeone.app/f20560451a4b49a4982de16283a8bddf.png"
                  alt="모델사진4"
                />
              </div>
            </div>
            <button class="btn-left" id="dlwjsbtn" aria-label="이전 사진">
              &#10094;
            </button>
            <button class="btn-right" id="ekdmabtn" aria-label="다음 사진">
              &#10095;
            </button>
          </div>

          <div class="border-box today-recommend">
            <h3>오늘의 추천 코디</h3>

            <button type="button" id="aiRecommendBtn" class="ai-btn">
              ⚡ AI 날씨 맞춤 추천받기
            </button>

            <div class="item-grid">
              <div class="border-box box" id="rec-item-1">상의</div>
              <div class="border-box box" id="rec-item-2">하의</div>
              <div class="border-box box" id="rec-item-3">아우터</div>
              <div class="border-box box" id="rec-item-4">신발</div>
              <div class="border-box box" id="rec-item-5">가방</div>
              <div class="border-box box" id="rec-item-6">소품</div>
            </div>
            <p class="item-desc" id="recommendDesc">
              위의 버튼을 누르면 현재 기온에 맞는 추천 의류 정보가 이곳에
              나타납니다.
            </p>
            <button class="buy-btn" data-link="https://www.musinsa.com">
              추천 코디 구매하기
            </button>
          </div>
        </div>

        <div class="bottom-content">
          <div class="clothing-zone">
            <h3>👕 TOP (상의)</h3>
            <div class="card-row" id="cardTop">
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png"
                  alt="상의"
                />
              </div>
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png"
                  alt="상의"
                />
              </div>
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png"
                  alt="상의"
                />
              </div>
            </div>
          </div>

          <div class="clothing-zone">
            <h3>👖 PANTS (팬츠)</h3>
            <div class="card-row" id="cardBottom">
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/MxBd6vY5/6371083-17772584866330-big.png"
                  alt="하의"
                />
              </div>
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/MxBd6vY5/6371083-17772584866330-big.png"
                  alt="하의"
                />
              </div>
            </div>
          </div>

          <div class="clothing-zone">
            <h3>👔 SETUP (셋업)</h3>
            <div class="card-row" id="cardSet">
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/BH7Nb0Hb/3783092-17708794030062-big.png"
                  alt="후드티"
                />
              </div>
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/BH7Nb0Hb/3783092-17708794030062-big.png"
                  alt="후드티"
                />
              </div>
            </div>
          </div>

          <div class="clothing-zone">
            <h3>🧥 OUTER (아우터)</h3>
            <div class="card-row" id="cardOuter">
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/GQJ77TSJ/6101998-17739852939208-big.png"
                  alt="상하의"
                />
              </div>
              <div class="border-box card">
                <img
                  class="card-img"
                  src="https://i.ibb.co/GQJ77TSJ/6101998-17739852939208-big.png"
                  alt="상하의"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="avatar-section">
        <h2 class="avatar-title">🤖 AI 실시간 스마트 아바타 피팅룸</h2>

        <div class="gender-selector">
          <button type="button" class="gender-btn active-gender" id="btnFemale">
            여성 아바타
          </button>
          <button type="button" class="gender-btn" id="btnMale">
            남성 아바타
          </button>
        </div>

        <div class="fitting-container">
          <div class="avatar-display" id="avatarModel">
            <span class="avatar-gender-label" id="avatarGenderText"
              >여성 모델 기본값</span
            >
            <div id="avatarGraphic" style="font-size: 5rem">👩</div>
            <div style="margin-top: 15px; font-size: 0.9rem; color: #888">
              피팅 대기 중
            </div>
          </div>

          <div class="avatar-clothes-spec">
            <div class="spec-layer">
              <div class="spec-label" style="background: #e63946">
                착용 아우터
              </div>
              <div class="spec-value" id="fitOuter">선택 안 됨</div>
            </div>
            <div class="spec-layer">
              <div class="spec-label" style="background: #457b9d">
                착용 상의
              </div>
              <div class="spec-value" id="fitTop">선택 안 됨</div>
            </div>
            <div class="spec-layer">
              <div class="spec-label" style="background: #2a9d8f">
                착용 하의
              </div>
              <div class="spec-value" id="fitBottom">선택 안 됨</div>
            </div>
            <div class="spec-layer">
              <div class="spec-label" style="background: #f4a261">
                착용 슈즈
              </div>
              <div class="spec-value" id="fitShoes">선택 안 됨</div>
            </div>
            <div class="spec-layer">
              <div class="spec-label" style="background: #6d597a">악세사리</div>
              <div class="spec-value" id="fitAcc">선택 안 됨</div>
            </div>
          </div>
        </div>

        <div class="border-box floating-nav">네비게이션 바</div>
      </section>
    </div>

    <script src="slideSetUp.js"></script>
  </body>
</html>
