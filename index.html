<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="mainDesign.css" />
    <title>입을만해</title>
  </head>
  <body>
    <section class="screen-01">
      <div class="top-logo">로고</div>
      <h1>기온 및 날씨<br />정보</h1>
    </section>

    <div id="mainApp" class="main-app spring">
      <header class="app-header">
        <div class="left-info">
          <span>로고</span>
          <span>날씨 정보 (간략히)</span>
        </div>
        <div class="theme-switch">
          <button
            type="button"
            class="season-btn active-season"
            data-season="spring"
          >
            봄
          </button>
          <button type="button" class="season-btn" data-season="summer">
            여름
          </button>
          <button type="button" class="season-btn" data-season="autumn">
            가을
          </button>
          <button type="button" class="season-btn" data-season="winter">
            겨울
          </button>
        </div>
      </header>

      <section class="screen-02">
        <div class="top-content">
          <div class="box" id="box">
            <div class="slider">
              <div class="adimage">
                <img
                  src="https://lovely-orange-ebdppdfd7q.edgeone.app/9k.png"
                  alt="모델사진1"
                />
              </div>
              <div class="adimage">
                <img
                  src="https://oral-peach-qcbkbuypef.edgeone.app/9k%E3%85%8F.png"
                  alt="모델사진2"
                />
              </div>
              <div class="adimage">
                <img
                  src="https://objective-rose-ecp2k6ir6t.edgeone.app/2Q.png"
                  alt="모델사진3"
                />
              </div>
              <div class="adimage">
                <img
                  src="https://mammoth-amaranth-buzithtol8.edgeone.app/f20560451a4b49a4982de16283a8bddf.png"
                  alt="모델사진4"
                />
              </div>
            </div>
            <button class="btn-left" id="dlwjsbtn" aria-label="이전 사진">
              &#10094;
            </button>
            <button class="btn-right" id="ekdmabtn" aria-label="다음 사진">
              &#10095;
            </button>
          </div>

          <div class="border-box today-recommend">
            <h3>오늘의 추천 코디</h3>
            <div class="item-grid">
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
              <div class="border-box box"></div>
            </div>
            <p class="item-desc">
              의류? 아이템 설명<br />가격이라던가 이름이라던가 특징이라던가
            </p>
          </div>
        </div>

       <div class="bottom-content">
          <div class="tabs" id="categoryTabs">
          <button type="button" class="tab-btn active-tab" data-target="cardTop">상의</button>
          <button type="button" class="tab-btn" data-target="cardBottom">팬츠</button>
          <button type="button" class="tab-btn" data-target="cardHood">셋업</button>
          <button type="button" class="tab-btn" data-target="cardSet">아우터</button>
          <button type="button" class="tab-btn" data-target="cardUnderwear">언더웨어</button>
          </div>

          <!-- 상의 -->
          <div class="card-row" id="cardTop">
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png" alt="상의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png" alt="상의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png" alt="상의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/W4cthkKL/detail-6357599-17768432610933-big.png" alt="상의"></div>
          </div>

          <!-- 하의 -->
          <div class="card-row" id="cardBottom" style="display: none;">
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/MxBd6vY5/6371083-17772584866330-big.png" alt="하의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/MxBd6vY5/6371083-17772584866330-big.png" alt="하의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/MxBd6vY5/6371083-17772584866330-big.png" alt="하의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/MxBd6vY5/6371083-17772584866330-big.png" alt="하의"></div>
            
          </div>

          <!-- 후드티 -->
          <div class="card-row" id="cardHood" style="display: none;">
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/BH7Nb0Hb/3783092-17708794030062-big.png" alt="후드티"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/BH7Nb0Hb/3783092-17708794030062-big.png" alt="후드티"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/BH7Nb0Hb/3783092-17708794030062-big.png" alt="후드티"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/BH7Nb0Hb/3783092-17708794030062-big.png" alt="후드티"></div>
            
          </div>

          <!-- 상하의 -->
          <div class="card-row" id="cardSet" style="display: none;">
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/GQJ77TSJ/6101998-17739852939208-big.png" alt="상하의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/GQJ77TSJ/6101998-17739852939208-big.png" alt="상하의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/GQJ77TSJ/6101998-17739852939208-big.png" alt="상하의"></div>
            <div class="border-box card"><img class="card-img" src="https://i.ibb.co/GQJ77TSJ/6101998-17739852939208-big.png" alt="상하의"></div>
          </div>

            <!-- 언더웨어 -->
          <div class="card-row" id="cardUnderwear" style="display: none;">
            <div class="border-box card"><img class="card-img" src="https://pbs.twimg.com/media/FFHe7WQagAA8PO8?format=png&name=900x900" alt="언더웨어"></div>
            <div class="border-box card"><img class="card-img" src="https://pbs.twimg.com/media/FFHe7WQagAA8PO8?format=png&name=900x900" alt="언더웨어"></div>
            <div class="border-box card"><img class="card-img" src="https://pbs.twimg.com/media/FFHe7WQagAA8PO8?format=png&name=900x900" alt="언더웨어"></div>
            <div class="border-box card"><img class="card-img" src="https://pbs.twimg.com/media/FFHe7WQagAA8PO8?format=png&name=900x900" alt="언더웨어"></div>
          </div>
        </div>
      </section>


      <section class="screen-03">
        <aside class="sidebar">
          <div class="border-box side-box">의류 카테고리</div>
          <div class="border-box side-box">검색 필터</div>
        </aside>

        <div class="scroll-content">
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
          <div class="border-box card highlight">
            아래로<br />스크롤시 해당<br />영역만 움직임
          </div>
          <div class="border-box card">카드</div>
          <div class="border-box card">카드</div>
        </div>
        <div class="border-box floating-nav">네비게이션 바</div>
      </section>
    </div>

    <script src="slideSetUp.js"></script>
  </body>
</html>
